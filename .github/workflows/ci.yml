name: Python CI and Repository Visualizer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('calculator/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r calculator/requirements.txt

      - name: Lint Python files
        run: |
          python -m py_compile calculator/run.py calculator/app/__init__.py calculator/app/routes/main.py

      - name: Generate repository structure visualization
        run: |
          echo "# Repository structure" > repo-structure.md
          find . -path './.git' -prune -o -print | sed 's|^./||' >> repo-structure.md

      - name: Upload repository visualization artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-structure
          path: repo-structure.md
